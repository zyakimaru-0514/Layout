<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>就活＠HCS ログイン画面（スマホ版 320×568）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Kaku+Gothic+New:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0f2c52; --navy-2:#16386b; --blue:#1f6feb; --blue-d:#1559c0;
    --blue-l:#e8f1ff; --sky:#4d94ff; --ink:#1a2533; --slate:#5b6b80;
    --line:#e2e8f1; --bg:#eef2f7; --card:#ffffff;
    --ok:#1f9d55; --gray:#8696aa;
    --shadow:0 14px 36px -16px rgba(15,44,82,.30);
    --font:'Noto Sans JP',sans-serif; --display:'Zen Kaku Gothic New','Noto Sans JP',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#cfd8e6}
  body{font-family:var(--font);color:var(--ink);-webkit-font-smoothing:antialiased;display:flex;justify-content:center;align-items:flex-start;padding:40px}

  /* 320x568 fixed frame */
  .screen{
    width:320px;height:568px;flex:0 0 auto;position:relative;overflow:hidden;
    display:flex;flex-direction:column;
    background:
      radial-gradient(280px 200px at 50% -6%, var(--navy-2), transparent 72%),
      linear-gradient(180deg,var(--navy) 0%, var(--navy) 33%, var(--bg) 33%, var(--bg) 100%);
  }

  /* top brand area */
  .top{padding:26px 24px 40px;color:#fff;position:relative;flex:0 0 auto}
  .top .ring{position:absolute;right:-44px;top:-30px;width:150px;height:150px;border-radius:50%;border:26px solid rgba(77,148,255,.12)}
  .top .ring2{position:absolute;left:-34px;top:42px;width:90px;height:90px;border-radius:50%;border:1px solid rgba(255,255,255,.12)}
  .logo{display:flex;align-items:center;gap:11px;position:relative;z-index:2}
  .logo .brandmark{
    width:42px;height:42px;border-radius:12px;flex:0 0 42px;
    background:linear-gradient(150deg,var(--sky),var(--blue) 55%,var(--navy-2));
    display:flex;align-items:center;justify-content:center;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.4),0 8px 18px -8px rgba(31,111,235,.7);
  }
  .logo .brandmark svg{width:23px;height:23px}
  .logo .t{font-family:var(--display);font-weight:900;font-size:18px;line-height:1.25;letter-spacing:.02em}
  .logo .t small{display:block;font-size:9px;font-weight:500;opacity:.66;letter-spacing:.12em;margin-top:3px}
  .welcome{margin-top:22px;position:relative;z-index:2}
  .welcome h2{font-family:var(--display);font-size:24px;font-weight:900;letter-spacing:.03em}
  .welcome p{margin-top:7px;font-size:11px;opacity:.74;font-weight:500;line-height:1.5}

  /* login card */
  .login-card{
    margin:0 18px;background:var(--card);border-radius:18px;padding:20px 18px 22px;
    box-shadow:var(--shadow);position:relative;z-index:3;
  }
  .field{margin-bottom:15px}
  .field label{display:block;font-size:11px;font-weight:700;color:var(--navy);margin-bottom:7px}
  .inp{
    width:100%;height:44px;border:1.5px solid var(--line);border-radius:11px;
    padding:0 13px;font-size:12px;color:var(--ink);background:#fbfdff;
    display:flex;align-items:center;gap:9px;
  }
  .inp svg{width:16px;height:16px;flex:0 0 16px;color:var(--gray)}
  .inp.focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px var(--blue-l)}
  .inp .ph{color:#9aa8ba;font-size:12px}
  .inp .val{color:var(--ink);font-size:12px}
  .inp .dots-pw{letter-spacing:3px;color:var(--ink);font-size:15px}

  .btn-primary{
    width:100%;height:46px;border:none;border-radius:12px;cursor:pointer;margin-top:4px;
    background:linear-gradient(135deg,var(--sky) 0%,var(--blue) 45%,var(--blue-d) 100%);color:#fff;
    font-family:var(--font);font-weight:700;font-size:14px;letter-spacing:.05em;
    box-shadow:0 10px 20px -8px rgba(31,111,235,.72);
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .btn-primary svg{width:16px;height:16px}

  /* footer */
  .foot{margin-top:auto;padding:0 24px 24px;text-align:center;flex:0 0 auto}
  .lan-note{
    display:inline-flex;align-items:center;gap:7px;font-size:10px;color:var(--slate);
    font-weight:600;background:#fff;border:1px solid var(--blue-l);padding:8px 13px;border-radius:999px;
  }
  .lan-note svg{width:13px;height:13px;color:var(--ok)}
  .ver{margin-top:10px;font-size:9px;color:var(--gray);font-weight:500;letter-spacing:.05em}
</style>
</head>
<body>
  <div class="screen">

    <div class="top">
      <div class="ring"></div><div class="ring2"></div>
      <div class="logo">
        <div class="brandmark"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg></div>
        <div class="t">就活＠HCS<small>JOB HUNTING SUPPORT</small></div>
      </div>
      <div class="welcome">
        <h2>ログイン</h2>
        <p>ユーザID・パスワードを入力してください</p>
      </div>
    </div>

    <div class="login-card">
      <div class="field">
        <label>ユーザID</label>
        <div class="inp">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 6 10-6"/></svg>
          <span class="ph">20243042-...@hcs.ac.jp</span>
        </div>
      </div>
      <div class="field">
        <label>パスワード</label>
        <div class="inp focus">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <span class="dots-pw">••••••</span>
        </div>
      </div>
      <button class="btn-primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><path d="M10 17l5-5-5-5M15 12H3"/></svg>
        ログイン
      </button>
    </div>

    <div class="foot">
      <span class="lan-note">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        学内LANからのみアクセス可能です
      </span>
      <div class="ver">Version 1.0.0</div>
    </div>

  </div>
</body>
</html>
