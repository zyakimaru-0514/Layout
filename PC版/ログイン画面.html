<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>就活＠HCS ログイン画面（PC版 1920×1080）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Kaku+Gothic+New:wght@500;700;900&display=swap" rel="stylesheet">
<style>
:root{
    --navy:#0f2c52; --navy-2:#16386b; --blue:#1f6feb; --blue-d:#1559c0;
    --blue-l:#e8f1ff; --sky:#4d94ff; --ink:#1a2533; --slate:#5b6b80;
    --line:#e2e8f1; --bg:#eef2f7; --card:#ffffff;
    --ok:#1f9d55; --gray:#8696aa;
    --shadow:0 24px 60px -24px rgba(15,44,82,.30);
    --shadow-sm:0 2px 8px -2px rgba(15,44,82,.14);
    --font:'Noto Sans JP',sans-serif; --display:'Zen Kaku Gothic New','Noto Sans JP',sans-serif;
}
  *{box-sizing:border-box;margin:0;padding:0}
html,body{background:#cfd8e6}
body{font-family:var(--font);color:var(--ink);-webkit-font-smoothing:antialiased;display:flex;justify-content:center;align-items:flex-start;padding:40px}

  /* 1920x1080 fixed frame */
.screen{
    width:1920px;height:1080px;flex:0 0 auto;position:relative;overflow:hidden;
    background:
      radial-gradient(1400px 900px at 78% 12%, #f3f8ff 0%, transparent 60%),
      linear-gradient(180deg,#f5f9ff 0%, var(--bg) 100%);
    display:flex;
  }

  /* ===== left brand panel ===== */
  .hero{
    width:62%;flex:0 0 62%;position:relative;overflow:hidden;color:#fff;
    padding:96px 110px;display:flex;flex-direction:column;
    background:
      radial-gradient(900px 600px at 110% -5%, var(--navy-2), transparent 62%),
      radial-gradient(700px 520px at -10% 115%, #15407a, transparent 60%),
      linear-gradient(150deg,var(--navy) 0%, #112d57 60%, var(--navy) 100%);
  }
  /* airy decorative rings for 清涼感 */
  .hero .ring{position:absolute;border-radius:50%;pointer-events:none}
  .hero .ring.a{width:760px;height:760px;right:-240px;top:-200px;border:70px solid rgba(77,148,255,.10)}
  .hero .ring.b{width:460px;height:460px;right:120px;bottom:-180px;border:1px solid rgba(255,255,255,.10)}
  .hero .ring.c{width:300px;height:300px;left:-120px;top:38%;border:46px solid rgba(255,255,255,.045)}
  .hero .glow{position:absolute;width:520px;height:520px;right:-60px;top:120px;background:radial-gradient(circle,rgba(77,148,255,.28),transparent 70%);filter:blur(20px);pointer-events:none}

  .hero .logo{display:flex;align-items:center;gap:20px;position:relative;z-index:2}
  .hero .logo .brandmark{
    width:74px;height:74px;border-radius:20px;flex:0 0 74px;
    background:linear-gradient(150deg,var(--sky),var(--blue) 55%,var(--navy-2));
    display:flex;align-items:center;justify-content:center;
    box-shadow:inset 0 2px 0 rgba(255,255,255,.4),0 14px 30px -12px rgba(31,111,235,.7);
  }
  .hero .logo .brandmark svg{width:40px;height:40px}
  .hero .logo .t{font-family:var(--display);font-weight:900;font-size:38px;line-height:1.2;letter-spacing:.02em}
  .hero .logo .t small{display:block;font-size:17px;font-weight:500;opacity:.66;letter-spacing:.16em;margin-top:6px}

  .hero .mid{margin:auto 0;position:relative;z-index:2}
  .hero .mid h2{font-family:var(--display);font-size:62px;font-weight:900;line-height:1.32;letter-spacing:.02em}
  .hero .mid h2 .hl{color:var(--sky)}
  .hero .mid .sub{margin-top:30px;font-size:21px;font-weight:600;opacity:.82;letter-spacing:.06em}

  .hero .foot{position:relative;z-index:2;display:flex;align-items:center;gap:14px;font-size:17px;font-weight:600;opacity:.78}
  .hero .foot svg{width:22px;height:22px}

  /* ===== right login panel ===== */
  .panel{
    width:38%;flex:0 0 38%;background:#fff;display:flex;align-items:center;justify-content:center;
    box-shadow:-30px 0 80px -50px rgba(15,44,82,.45);position:relative;
  }
  .panel::before{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(620px 480px at 50% 8%, #f2f8ff 0%, transparent 60%);
  }
  .login-box{width:520px;max-width:78%;position:relative;z-index:2;text-align:center}

  .login-box .head{margin-bottom:54px}
  .login-box .head h3{font-family:var(--display);font-size:42px;font-weight:900;color:var(--navy);letter-spacing:.04em}
  .login-box .head p{font-size:17px;color:var(--slate);margin-top:14px;font-weight:500}

  .field{margin-bottom:28px;text-align:left}
  .field label{display:block;font-size:16px;font-weight:700;color:var(--navy);margin-bottom:12px;letter-spacing:.02em}
  .inp{
    width:100%;height:68px;border:2px solid var(--line);border-radius:16px;
    padding:0 22px;font-family:var(--font);font-size:18px;color:var(--ink);background:#fbfdff;
    display:flex;align-items:center;gap:16px;transition:.15s;
  }
  .inp svg{width:23px;height:23px;flex:0 0 23px;color:var(--gray)}
  .inp.focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 5px var(--blue-l)}
  .inp .val{color:var(--ink);font-size:18px}
  .inp .ph{color:#9aa8ba;font-size:18px}
  .inp .dots-pw{letter-spacing:5px;color:var(--ink);font-size:22px;line-height:1}

  .btn-primary{
    width:100%;height:70px;border:none;border-radius:16px;cursor:pointer;margin-top:8px;
    background:linear-gradient(135deg,var(--sky) 0%,var(--blue) 45%,var(--blue-d) 100%);color:#fff;
    font-family:var(--font);font-weight:700;font-size:21px;letter-spacing:.1em;
    box-shadow:0 18px 36px -14px rgba(31,111,235,.72);
    display:flex;align-items:center;justify-content:center;gap:12px;
  }
  .btn-primary svg{width:23px;height:23px}

  .lan-note{
    margin-top:42px;display:inline-flex;align-items:center;gap:11px;font-size:16px;color:var(--slate);
    font-weight:600;background:#f4f9ff;border:1.5px solid var(--blue-l);padding:14px 24px;border-radius:999px;
  }
  .lan-note svg{width:19px;height:19px;color:var(--ok)}
  .ver{margin-top:22px;font-size:14px;color:var(--gray);font-weight:500;letter-spacing:.06em}
</style>
</head>
<body>
  <div class="screen">

    <!-- LEFT: brand -->
    <div class="hero">
      <div class="ring a"></div><div class="ring b"></div><div class="ring c"></div><div class="glow"></div>

      <div class="logo">
        <div class="brandmark"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg></div>
        <div class="t">就活＠HCS<small>JOB HUNTING SUPPORT</small></div>
      </div>

      <div class="mid">
        <h2>ようこそ、<br><span class="hl">就活＠HCS</span> へ。</h2>
        <div class="sub">北海道情報専門学校 就職活動支援システム</div>
      </div>

      <div class="foot">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        通信は暗号化されています
      </div>
    </div>

    <!-- RIGHT: login form (centered) -->
    <div class="panel">
      <div class="login-box">
        <div class="head">
          <h3>ログイン</h3>
          <p>ユーザID（メールアドレス）とパスワードを入力してください</p>
        </div>

        <div class="field">
          <label>ユーザID</label>
          <div class="inp focus">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 6 10-6"/></svg>
            <span class="val">20243042-akahoyuuto@hcs.ac.jp</span>
          </div>
        </div>

        <div class="field">
          <label>パスワード</label>
          <div class="inp">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <span class="dots-pw">••••••••••</span>
          </div>
        </div>

        <button class="btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><path d="M10 17l5-5-5-5M15 12H3"/></svg>
          ログイン
        </button>

        <div>
          <span class="lan-note">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            学内LANからのみアクセス可能です
          </span>
        </div>
        <div class="ver">Version 1.0.0</div>
      </div>
    </div>

  </div>
</body>
</html>
