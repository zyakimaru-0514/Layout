<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>申請登録画面</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0f2c52;
    --blue:#1f6feb;
    --paleblue:#e8f1ff;
    --bg:#eef2f7;
    --success:#1f9d55;
    --warn:#d9822b;
    --danger:#d64545;
    --line:#d8e0ea;
    --text:#1f2a37;
    --muted:#6b7785;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#c7ced6;font-family:"Noto Sans JP",sans-serif;color:var(--text);}
  .heading{font-family:"Zen Kaku Gothic New",sans-serif;}

  .screen{width:1920px;height:1080px;overflow:hidden;background:var(--bg);display:flex;position:relative;}

  /* ===== サイドバー ===== */
  .sidebar{width:248px;height:100%;background:var(--navy);color:#dfe7f2;display:flex;flex-direction:column;flex-shrink:0;}
  .brand{height:72px;display:flex;align-items:center;gap:10px;padding:0 22px;border-bottom:1px solid rgba(255,255,255,.10);}
  .brand .logo{width:34px;height:34px;border-radius:9px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-family:"Zen Kaku Gothic New";font-weight:700;color:#fff;font-size:18px;}
  .brand .name{font-family:"Zen Kaku Gothic New";font-weight:700;font-size:20px;color:#fff;letter-spacing:.5px;}
  .nav{padding:16px 12px;display:flex;flex-direction:column;gap:4px;flex:1;}
  .nav-label{font-size:11px;color:#7f93b3;padding:10px 12px 6px;letter-spacing:.5px;}
  .nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;font-size:14.5px;color:#cdd8ea;cursor:pointer;}
  .nav-item .ico{width:20px;height:20px;flex-shrink:0;opacity:.9;}
  .nav-item:hover{background:rgba(255,255,255,.06);}
  .nav-item.active{background:var(--blue);color:#fff;font-weight:500;}
  .nav-item.active .ico{opacity:1;}
  .side-foot{padding:14px 18px;border-top:1px solid rgba(255,255,255,.10);display:flex;align-items:center;gap:11px;}
  .side-foot .avatar{width:38px;height:38px;border-radius:50%;background:#2a4a7a;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;flex-shrink:0;}
  .side-foot .u-name{font-size:14px;color:#fff;font-weight:500;}
  .side-foot .u-role{font-size:11.5px;color:#8ea3c4;}

  /* ===== メイン ===== */
  .main{flex:1;display:flex;flex-direction:column;min-width:0;}
  .topbar{height:72px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 32px;flex-shrink:0;}
  .crumb{font-size:12.5px;color:var(--muted);}
  .top-title{font-family:"Zen Kaku Gothic New";font-weight:700;font-size:22px;color:var(--navy);margin-top:2px;}
  .top-right{display:flex;align-items:center;gap:18px;}
  .bell{position:relative;width:24px;height:24px;color:var(--navy);}
  .bell .dot{position:absolute;top:-2px;right:-2px;width:9px;height:9px;background:var(--danger);border-radius:50%;border:2px solid #fff;}
  .top-date{font-size:13px;color:var(--muted);}

  .content{padding:14px 32px;overflow:hidden;}

  /* フォーム（全幅） */
  .formcol{width:100%;}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 1px 2px rgba(15,44,82,.04);}
  .card + .card{margin-top:14px;}
  .card-head{display:flex;align-items:center;gap:9px;padding:14px 24px;border-bottom:1px solid #eef2f7;}
  .card-head .ico{width:19px;height:19px;color:var(--blue);}
  .card-head h2{font-family:"Zen Kaku Gothic New";font-weight:700;font-size:15.5px;color:var(--navy);}
  .card-body{padding:16px 24px;}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:13px 40px;}
  .field{display:flex;flex-direction:column;gap:7px;}
  .field.full{grid-column:1 / -1;}
  .field label{font-size:12.5px;color:#42505f;font-weight:500;display:flex;align-items:center;gap:7px;}
  .req{font-size:10.5px;background:var(--danger);color:#fff;border-radius:4px;padding:1px 6px;font-weight:500;}
  .opt{font-size:10.5px;background:#eef2f7;color:var(--muted);border-radius:4px;padding:1px 6px;}
  .field input,.field select,.field textarea{
    border:1px solid var(--line);border-radius:9px;background:#fbfcfe;
    padding:0 13px;font-size:14px;font-family:"Noto Sans JP";color:var(--text);height:44px;
  }
  .field textarea{height:64px;padding:10px 13px;resize:none;line-height:1.5;}
  .field input::placeholder,.field textarea::placeholder{color:#9aa6b3;}
  .hint{font-size:11.5px;color:var(--muted);}
  .corp-wrap{position:relative;display:flex;gap:10px;}
  .corp-wrap input{flex:1;}
  .corp-wrap .mini{height:44px;padding:0 16px;border:1px solid var(--blue);background:var(--paleblue);color:var(--blue);border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;}
  .row2{display:flex;gap:10px;}
  .row2 input{flex:1;}

  /* セグメント（区分ボタン） */
  .seg{display:flex;flex-wrap:wrap;gap:8px;}
  .seg .opt-btn{padding:9px 15px;border:1px solid var(--line);background:#fff;border-radius:8px;font-size:13px;color:#42505f;cursor:pointer;}
  .seg .opt-btn.on{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:500;}

  /* 学校申込トグル領域 */
  .toggle-row{display:flex;align-items:center;gap:14px;}
  .switch{width:46px;height:26px;border-radius:999px;background:#cbd5e1;position:relative;cursor:pointer;flex-shrink:0;}
  .switch.on{background:var(--blue);}
  .switch .knob{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.15s;}
  .switch.on .knob{left:23px;}
  .toggle-row .t-txt{font-size:13.5px;color:#42505f;}
  .apply-detail{margin-top:14px;padding-top:14px;border-top:1px dashed var(--line);}

  /* AIアシスト（横型バナー） */
  /* フッターバー（AI＋アクション統合） */
  .footerbar{margin-top:14px;background:linear-gradient(135deg,#13325c,#1f6feb);border-radius:14px;padding:16px 26px;color:#fff;display:flex;align-items:center;justify-content:space-between;gap:24px;}
  .ai-text{min-width:0;}
  .footerbar .h{display:flex;align-items:center;gap:9px;font-family:"Zen Kaku Gothic New";font-weight:700;font-size:15.5px;}
  .footerbar .h .ico{width:20px;height:20px;}
  .footerbar p{font-size:12.5px;color:#d7e6ff;margin-top:6px;line-height:1.5;}
  .footer-actions{display:flex;align-items:center;gap:12px;flex-shrink:0;}
  .ai-btn{height:46px;padding:0 22px;border:1px solid rgba(255,255,255,.4);border-radius:9px;background:rgba(255,255,255,.16);color:#fff;font-size:14px;font-weight:500;cursor:pointer;backdrop-filter:blur(2px);}
  .btn{height:46px;padding:0 28px;border:none;border-radius:9px;cursor:pointer;font-family:"Noto Sans JP";font-weight:500;font-size:14.5px;display:inline-flex;align-items:center;gap:8px;}
  .btn .ico{width:17px;height:17px;}
  .btn-primary{background:#fff;color:var(--blue);}
  .btn-ghost{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.5);}
</style>
</head>
<body>
<div class="screen">

  <!-- サイドバー -->
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">就</div>
      <div class="name">就活＠HCS</div>
    </div>
    <nav class="nav">
      <div class="nav-label">就職活動</div>
      <div class="nav-item">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/></svg>
        <span>トップ（申請一覧）</span>
      </div>
      <div class="nav-item active">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 8h8M8 12h8M8 16h5"/></svg>
        <span>申請登録</span>
      </div>
      <div class="nav-item">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 11l3 3 8-8"/><path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9"/></svg>
        <span>活動報告</span>
      </div>
      <div class="nav-label">情報閲覧</div>
      <div class="nav-item">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <span>受験報告閲覧</span>
      </div>
      <div class="nav-item">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2a4 4 0 0 1 4 4c0 2-1.5 3-2.5 4S12 16 12 16"/><circle cx="12" cy="20" r="1"/></svg>
        <span>AIアシスト</span>
      </div>
    </nav>
    <div class="side-foot">
      <div class="avatar">情</div>
      <div>
        <div class="u-name">情報太郎</div>
        <div class="u-role">学生 / S3A201</div>
      </div>
    </div>
  </aside>

  <!-- メイン -->
  <div class="main">
    <header class="topbar">
      <div>
        <div class="crumb">就職活動 ＞ 申請登録</div>
        <div class="top-title heading">就職活動申請の登録</div>
      </div>
      <div class="top-right">
        <div class="bell">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10 21a2 2 0 0 0 4 0"/></svg>
          <span class="dot"></span>
        </div>
        <span class="top-date">2026年5月30日（土）</span>
      </div>
    </header>

    <div class="content">

      <!-- 左カラム：フォーム -->
      <div class="formcol">

        <!-- 申請内容 -->
        <section class="card">
          <div class="card-head">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 8h8M8 12h8M8 16h5"/></svg>
            <h2 class="heading">申請内容</h2>
          </div>
          <div class="card-body">
            <div class="grid">
              <div class="field full">
                <label>企業名 <span class="req">必須</span></label>
                <div class="corp-wrap">
                  <input type="text" placeholder="登記上の正式名称を入力（マスタから予測変換）">
                  <button class="mini">＋ 新規登録</button>
                </div>
                <span class="hint">企業マスタに無い場合は「新規登録」から仮登録できます（省略不可）</span>
              </div>

              <div class="field">
                <label>開始日時 <span class="req">必須</span></label>
                <div class="row2">
                  <input type="date" value="2026-06-03">
                  <input type="time" value="10:00">
                </div>
              </div>
              <div class="field">
                <label>終了日時 <span class="req">必須</span></label>
                <div class="row2">
                  <input type="date" value="2026-06-03">
                  <input type="time" value="11:30">
                </div>
              </div>

              <div class="field">
                <label>場所区分 <span class="req">必須</span></label>
                <select>
                  <option>選択してください</option>
                  <option>自宅</option>
                  <option selected>学校</option>
                  <option>市内</option>
                  <option>道内</option>
                  <option>道外</option>
                  <option>その他</option>
                </select>
              </div>
              <div class="field">
                <label>場所（会場名・住所）<span class="opt">任意</span></label>
                <input type="text" placeholder="例）札幌市中央区〇〇ビル 5F">
              </div>

              <div class="field full">
                <label>イベント区分 <span class="req">必須</span></label>
                <div class="seg">
                  <span class="opt-btn">説明会（単独）</span>
                  <span class="opt-btn on">説明会（合同）</span>
                  <span class="opt-btn">筆記</span>
                  <span class="opt-btn">適性</span>
                  <span class="opt-btn">面接</span>
                  <span class="opt-btn">内定後活動</span>
                </div>
              </div>

              <div class="field">
                <label>遅刻／欠席／早退区分 <span class="req">必須</span></label>
                <select>
                  <option value="" selected disabled>選択してください</option>
                  <option>遅刻</option>
                  <option>欠席</option>
                  <option>早退</option>
                </select>
              </div>
              <div class="field">
                <label>対象時限（時限単位で指定）<span class="req">必須</span></label>
                <input type="text" placeholder="例）2〜4限">
              </div>
            </div>
          </div>
        </section>

        <!-- 学校申込 -->
        <section class="card">
          <div class="card-head">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M9 11l3 3 8-8"/><path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9"/></svg>
            <h2 class="heading">学校申込</h2>
          </div>
          <div class="card-body">
            <div class="toggle-row">
              <div class="switch on"><div class="knob"></div></div>
              <span class="t-txt">この活動は<strong>学校申込あり</strong>（取りまとめ名簿の対象）</span>
            </div>
            <div class="apply-detail">
              <div class="grid">
                <div class="field">
                  <label>申込締切日 <span class="req">必須</span></label>
                  <input type="date" value="2026-05-31">
                </div>
                <div class="field">
                  <label>書類提出要否 <span class="req">必須</span></label>
                  <div class="seg">
                    <span class="opt-btn on">要</span>
                    <span class="opt-btn">不要</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <!-- その他連絡事項 -->
        <section class="card">
          <div class="card-head">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <h2 class="heading">その他連絡事項</h2>
          </div>
          <div class="card-body">
            <div class="field full">
              <textarea placeholder="移動手段や担任への連絡事項などを入力してください"></textarea>
            </div>
          </div>
        </section>

        <!-- フッター：AIアシスト＋アクション -->
        <section class="footerbar">
          <div class="ai-text">
            <div class="h">
              <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M12 2a4 4 0 0 1 4 4c0 2-1.5 3-2.5 4S12 16 12 16"/><circle cx="12" cy="20" r="1"/></svg>
              AIに相談（事前チェック）
            </div>
            <p>記載漏れや同一日の区分整合性、申請日とイベント日の関係などをAIが自動でチェックします。</p>
          </div>
          <div class="footer-actions">
            <button class="ai-btn">入力内容をAIでチェック</button>
            <button class="btn btn-ghost">下書き保存</button>
            <button class="btn btn-primary">
              <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4z"/></svg>
              申請する
            </button>
          </div>
        </section>
      </div>

    </div>
  </div>
</div>
</body>
</html>
